# Generated from Workflow.pkl. DO NOT EDIT.
name: Pull Request
'on':
  pull_request: {}
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: read
jobs:
  check-format-pkl:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6
      with:
        persist-credentials: false
    - name: Setup Pkl
      id: setup-pkl
      env:
        PKL_VERSION: 0.30.1
        PKL_FILENAME: pkl
        PKL_DOWNLOAD_URL: https://github.com/apple/pkl/releases/download/0.30.1/pkl-linux-amd64
      shell: bash
      run: |-
        DIR="$(mktemp -d /tmp/pkl-$PKL_VERSION-XXXXXX)"
        PKL_EXEC="$DIR/$PKL_FILENAME"
        curl -sfL -o $PKL_EXEC "$PKL_DOWNLOAD_URL"
        chmod +x $PKL_EXEC
        echo "$DIR" >> "$GITHUB_PATH"
        echo "pkl_exec=$PKL_EXEC" >> "$GITHUB_OUTPUT"
    - name: Check Pkl Formatting
      run: pkl format --diff-name-only .
  check-format-go:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6
      with:
        persist-credentials: false
    - uses: actions/setup-go@4dc6199c7b1a012772edbd06daecab0f50c9053c # v6
      with:
        go-version: '1.25'
        check-latest: true
        cache-dependency-path: go.work.sum
    - name: Check Go Formatting
      run: |-
        go install mvdan.cc/gofumpt@v0.9.2
        gofumpt -d .
    - name: Check NOTICE.txt
      run: |-
        go install github.com/google/go-licenses/v2@v2.0.1
        ./scripts/create_notice.sh
        git diff --exit-code
  check-license-headers:
    name: hawkeye-check
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6
      with:
        ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || '' }}
        persist-credentials: false
        fetch-depth: 0
    - run: git config --global --add safe.directory $(pwd)
    - run: hawkeye check --config licenserc.toml --fail-if-unknown
    container:
      image: ghcr.io/korandoru/hawkeye@sha256:e0abf8dbfaeeeba1249679d662d9fb404b1dcdb041c6093ea1f7a6edb7d89319
  test-helm:
    name: 'test: helm'
    if: needs.discover-changed-files.outputs.changed_helm != '0'
    needs:
    - discover-changed-files
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6
      with:
        persist-credentials: false
    - name: Setup Pkl
      id: setup-pkl
      env:
        PKL_VERSION: 0.30.1
        PKL_FILENAME: pkl
        PKL_DOWNLOAD_URL: https://github.com/apple/pkl/releases/download/0.30.1/pkl-linux-amd64
      shell: bash
      run: |-
        DIR="$(mktemp -d /tmp/pkl-$PKL_VERSION-XXXXXX)"
        PKL_EXEC="$DIR/$PKL_FILENAME"
        curl -sfL -o $PKL_EXEC "$PKL_DOWNLOAD_URL"
        chmod +x $PKL_EXEC
        echo "$DIR" >> "$GITHUB_PATH"
        echo "pkl_exec=$PKL_EXEC" >> "$GITHUB_OUTPUT"
    - uses: actions/setup-go@4dc6199c7b1a012772edbd06daecab0f50c9053c # v6
      with:
        go-version: '1.25'
        check-latest: true
        cache-dependency-path: go.work.sum
    - run: mkdir -p helm/test-results
    - name: Run Go tests
      working-directory: helm
      run: |-
        go generate
        git diff --exit-code

        go install github.com/jstemmer/go-junit-report/v2@v2.1.0
        echo "Running Go unit tests"
        go test -race -v ./... 2>&1 | go-junit-report -iocopy -set-exit-code -out test-results/go-test-results.xml
    - name: Run Pkl tests
      working-directory: helm
      run: pkl test --project-dir pkl --junit-reports test-results --external-resource-reader reader+helm='go run ./cmd/pkl-reader-helm/... --package-version-check=false'
    - name: Upload Test Result XML
      if: '!cancelled()'
      uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
      with:
        name: test-results-xml-test-helm
        path: '*/test-results/**/*.xml'
        if-no-files-found: ignore
  test-prometheus:
    name: 'test: prometheus'
    if: needs.discover-changed-files.outputs.changed_prometheus != '0'
    needs:
    - discover-changed-files
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6
      with:
        persist-credentials: false
    - name: Setup Pkl
      id: setup-pkl
      env:
        PKL_VERSION: 0.30.1
        PKL_FILENAME: pkl
        PKL_DOWNLOAD_URL: https://github.com/apple/pkl/releases/download/0.30.1/pkl-linux-amd64
      shell: bash
      run: |-
        DIR="$(mktemp -d /tmp/pkl-$PKL_VERSION-XXXXXX)"
        PKL_EXEC="$DIR/$PKL_FILENAME"
        curl -sfL -o $PKL_EXEC "$PKL_DOWNLOAD_URL"
        chmod +x $PKL_EXEC
        echo "$DIR" >> "$GITHUB_PATH"
        echo "pkl_exec=$PKL_EXEC" >> "$GITHUB_OUTPUT"
    - uses: actions/setup-go@4dc6199c7b1a012772edbd06daecab0f50c9053c # v6
      with:
        go-version: '1.25'
        check-latest: true
        cache-dependency-path: go.work.sum
    - run: mkdir -p prometheus/test-results
    - name: Run Go tests
      working-directory: prometheus
      run: |-
        go generate
        git diff --exit-code

        go install github.com/jstemmer/go-junit-report/v2@v2.1.0
        echo "Running Go unit tests"
        go test -race -v ./... 2>&1 | go-junit-report -iocopy -set-exit-code -out test-results/go-test-results.xml
    - name: Run Pkl tests
      working-directory: prometheus
      run: pkl test --project-dir pkl --junit-reports test-results --external-resource-reader reader+prometheus='go run ./cmd/pkl-reader-prometheus/... --package-version-check=false'
    - name: Upload Test Result XML
      if: '!cancelled()'
      uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
      with:
        name: test-results-xml-test-prometheus
        path: '*/test-results/**/*.xml'
        if-no-files-found: ignore
  discover-changed-files:
    runs-on: ubuntu-latest
    outputs:
      changed_helm: ${{ steps.changed-files.outputs.helm }}
      changed_prometheus: ${{ steps.changed-files.outputs.prometheus }}
    steps:
    - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6
      with:
        persist-credentials: true
        fetch-depth: 0
    - name: Discover changed files
      id: changed-files
      env:
        BASE_REF: ${{ github.base_ref }}
      run: |-
        git fetch origin "$BASE_REF"
        set +e
        echo "Discovering changes for helm reader"
        git diff --name-only --exit-code "origin/$BASE_REF" -- basePklProject.pkl .github/** shared/go/** helm/**
        echo "helm=$?" >> "$GITHUB_OUTPUT"
        echo
        echo "Discovering changes for prometheus reader"
        git diff --name-only --exit-code "origin/$BASE_REF" -- basePklProject.pkl .github/** shared/go/** prometheus/**
        echo "prometheus=$?" >> "$GITHUB_OUTPUT"
        echo
  upload-event-file:
    runs-on: ubuntu-latest
    steps:
    - name: Upload event file
      if: '!cancelled()'
      uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
      with:
        name: test-results-event-file
        path: ${{ github.event_path }}
  check-pkl-github-actions:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6
      with:
        persist-credentials: false
    - name: Setup Pkl
      id: setup-pkl
      env:
        PKL_VERSION: 0.30.0
        PKL_FILENAME: pkl
        PKL_DOWNLOAD_URL: https://github.com/apple/pkl/releases/download/0.30.0/pkl-linux-amd64
      shell: bash
      run: |-
        DIR="$(mktemp -d /tmp/pkl-$PKL_VERSION-XXXXXX)"
        PKL_EXEC="$DIR/$PKL_FILENAME"
        curl -sfL -o $PKL_EXEC "$PKL_DOWNLOAD_URL"
        chmod +x $PKL_EXEC
        echo "$DIR" >> "$GITHUB_PATH"
        echo "pkl_exec=$PKL_EXEC" >> "$GITHUB_OUTPUT"
    - shell: bash
      run: rm -rf .github/**/[a-z]*.yml
    - shell: bash
      run: pkl eval -m .github/ --project-dir .github/ .github/index.pkl
    - name: check git status
      shell: bash
      run: |-
        if [ -n "$(git status --porcelain)" ]; then
          echo "Running pkl resulted in a diff! You likely need to run 'pkl eval' and commit the changes."
          git diff --name-only
          exit 1
        fi
